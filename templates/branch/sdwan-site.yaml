id: branch.sdwan-site
version: 1
description: SD-WAN branch with access LAN and users
params:
  site_label: {type: string, required: true}
groups:
  "{{ instance }}":
    label: "{{ site_label }}"
    kind: site
    nodes:
      "{{ instance }}-edge": {}
      "{{ instance }}-lan": {}
      "{{ instance }}-users": {}
nodes:
  "{{ instance }}-edge": {label: "{{ site_label }} SD-WAN Edge", role: edge-router}
  "{{ instance }}-lan": {label: "{{ site_label }} LAN", role: access-switch}
  "{{ instance }}-users": {label: "{{ site_label }} Users", role: endpoint}
links:
  - {from: "{{ instance }}-edge:Ethernet0/1", to: "{{ instance }}-lan:Ethernet1/49", label: Branch LAN}
  - {from: "{{ instance }}-lan:Ethernet1/1", to: "{{ instance }}-users:Ethernet0/0", label: Users}
