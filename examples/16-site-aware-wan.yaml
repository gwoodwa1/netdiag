    labels: {middle: LON-P01 · 100G}
    style: wan
  - from: {node: london-pe, port: HundredGigE0/1, address: 10.0.0.5/30}
    to: {node: p-02, port: HundredGigE0/0, address: 10.0.0.6/30}
    labels: {middle: LON-P02 · 100G}
    style: wan
  - from: {node: p-01, port: HundredGigE0/1, address: 10.0.0.9/30}
    to: {node: manchester-pe, port: HundredGigE0/0, address: 10.0.0.10/30}
