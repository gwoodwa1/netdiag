version: 1
diagram:
  title: Site-Aware Enterprise WAN
  subtitle: Native site containment with obstacle-aware orthogonal routing
  badge: SITE-AWARE NATIVE
  layout: sites
  link_style: orthogonal
  renderer: native
groups:
  london:
    label: London Headquarters
    kind: site
    groups:
      london-lan:
        label: Campus LAN
        kind: lan
        nodes:
          london-core: {}
          london-access: {}
          london-users: {}
    nodes:
      london-pe: {}
      london-fw: {}
  mpls-core:
    label: MPLS Core
    kind: core
    nodes:
      p-01: {}
      p-02: {}
  manchester:
    label: Manchester Branch
    kind: site
    groups:
      manchester-lan:
        label: Branch LAN
        kind: lan
        nodes:
          manchester-access: {}
          manchester-users: {}
    nodes:
      manchester-pe: {}
      manchester-fw: {}
nodes:
  london-pe: {label: London PE, role: edge-router, icon: router}
  london-fw: {label: London Firewall, role: firewall, icon: firewall}
  london-core: {label: London Core, role: core-switch, icon: core-switch}
  london-access: {label: London Access, role: access-switch, icon: access-switch}
  london-users: {label: London Users, role: endpoint, icon: users}
  p-01: {label: MPLS P01, role: router, icon: router}
  p-02: {label: MPLS P02, role: router, icon: router}
  manchester-pe: {label: Manchester PE, role: edge-router, icon: router}
  manchester-fw: {label: Manchester Firewall, role: firewall, icon: firewall}
  manchester-access: {label: Manchester Access, role: access-switch, icon: access-switch}
  manchester-users: {label: Manchester Users, role: endpoint, icon: users}
links:
  - from: {node: london-pe, port: HundredGigE0/0, address: 10.0.0.1/30}
